# Compose project label (Docker Desktop / `docker ps` grouping). Without this, the
# project name defaults to the `.docker` directory basename ("docker").
name: nautilus

services:
  workspace:
    container_name: nautilus-workspace
    build:
      context: ..
      dockerfile: .docker/DockerfileUbuntu
    working_dir: /workspace
    command: ["sleep", "infinity"]
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_CACHE_HOST:-redis}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace
    networks:
      - nautilus-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  nordvpn:
    container_name: nautilus-nordvpn
    profiles: ["vpn"]
    build:
      context: ..
      dockerfile: .docker/nordvpn.dockerfile
    env_file:
      - ../.env.nordvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "0"
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/usr/local/bin/nordvpn-entrypoint"]
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/nordvpn-healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
    # Port 8080 is published here because all services using network_mode: service:nordvpn
    # share this container's network namespace. The exit server binds to 8080 inside
    # that namespace, making it reachable via: docker exec nautilus-nordvpn wget -qO- http://127.0.0.1:8080/positions
    ports:
      - "8080:8080"
    networks:
      - nautilus-network
    restart: unless-stopped

  papertrade:
    container_name: nautilus-papertrade
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_paper_tester.py
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_CACHE_HOST:-redis}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace:ro
      - ../outputs:/workspace/outputs
    networks:
      - nautilus-network
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: "no"
    security_opt:
      - no-new-privileges:true

  papertrade-daemon:
    container_name: nautilus-papertrade-daemon
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_crypto_5m_paper_daemon.py
      - --asset
      - BTC
      - --preset-set
      - ${POLYMARKET_CRYPTO_5M_PRESET_SET:-research}
      - --max-rounds
      - ${POLYMARKET_CRYPTO_5M_MAX_ROUNDS:-0}
      - --execution-cutoff-seconds
      - ${POLYMARKET_CRYPTO_5M_EXECUTION_CUTOFF_SECONDS:-15}
    init: true
