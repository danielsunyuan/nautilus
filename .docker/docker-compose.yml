# Compose project label (Docker Desktop / `docker ps` grouping). Without this, the
# project name defaults to the `.docker` directory basename ("docker").
name: nautilus

services:
  workspace:
    container_name: nautilus-workspace
    build:
      context: ..
      dockerfile: .docker/DockerfileUbuntu
    working_dir: /workspace
    command: ["sleep", "infinity"]
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
      - ../.env.nordvpn
    volumes:
      - ..:/workspace
    networks:
      - nautilus-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  nordvpn:
    container_name: nautilus-nordvpn
    build:
      context: ..
      dockerfile: .docker/nordvpn.dockerfile
    env_file:
      - ../.env.nordvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "0"
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/usr/local/bin/nordvpn-entrypoint"]
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/nordvpn-healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
    networks:
      - nautilus-network
    restart: unless-stopped

  papertrade:
    container_name: nautilus-papertrade
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_paper_tester.py
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    volumes:
      - ..:/workspace:ro
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: "no"
    security_opt:
      - no-new-privileges:true

  papertrade-daemon:
    container_name: nautilus-papertrade-daemon
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_crypto_5m_paper_daemon.py
      - --asset
      - BTC
      - --preset-set
      - quant
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  postgres:
    container_name: nautilus-database
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nautilus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-nautilus}
      PGDATA: /data/postgres
    volumes:
      - nautilus-database:/data/postgres
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - nautilus-network
    restart: unless-stopped

  pgadmin:
    container_name: nautilus-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@mail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    volumes:
      - pgadmin:/root/.pgadmin
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5051}:80"
    networks:
      - nautilus-network
    restart: unless-stopped

  redis:
    container_name: nautilus-redis
    image: redis:7.2-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1"
      - --save
      - "300"
      - "10"
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - nautilus-redis:/data
    restart: unless-stopped
    networks:
      - nautilus-network

networks:
  nautilus-network:

volumes:
  nautilus-database:
  nautilus-redis:
  pgadmin:
