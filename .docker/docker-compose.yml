      POLYMARKET_MULTI_TF_TIMEFRAMES: "${POLYMARKET_MULTI_TF_TIMEFRAMES:-15m,1h}"
      POLYMARKET_MULTI_TF_POLL_15M: "${POLYMARKET_MULTI_TF_POLL_15M:-10}"
      POLYMARKET_MULTI_TF_POLL_1H: "${POLYMARKET_MULTI_TF_POLL_1H:-30}"
      POLYMARKET_MULTI_TF_OUTPUT: "/data/nautilus_export/multi_tf"
    volumes:
      - ${POLYMARKET_NAUTILUS_EXPORT_HOST_PATH:-/mnt/d/atlas/quant-polymarket-nautilus/nautilus_export}:/data/nautilus_export
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command: ["python", "-m", "scripts.polymarket_crypto_multi_tf_recorder"]

  signal-watcher-5m-vpn:
    container_name: nautilus-signal-watcher-5m-vpn
    profiles: ["vpn", "monitor"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      POLYMARKET_5M_ASSETS: "${POLYMARKET_5M_ASSETS:-BTC,ETH,SOL,XRP,DOGE,BNB,HYPE}"
      PM_LIVE_SIGNAL_PATH: "${PM_LIVE_SIGNAL_PATH:-/data/nautilus_export/live_signals/polymarket_5m_live_signals.jsonl}"
      PM_LIVE_SIGNAL_WINDOW_SECONDS: "${PM_LIVE_SIGNAL_WINDOW_SECONDS:-10}"
      PM_LIVE_SIGNAL_MID_THRESHOLD: "${PM_LIVE_SIGNAL_MID_THRESHOLD:-0.99}"
      PM_LIVE_SIGNAL_SPREAD_THRESHOLD: "${PM_LIVE_SIGNAL_SPREAD_THRESHOLD:-0.50}"
      PM_LIVE_SIGNAL_UPDATES_PER_S: "${PM_LIVE_SIGNAL_UPDATES_PER_S:-10}"
      PM_LIVE_SIGNAL_COOLDOWN_SECONDS: "${PM_LIVE_SIGNAL_COOLDOWN_SECONDS:-2}"
    volumes:
      - ${POLYMARKET_NAUTILUS_EXPORT_HOST_PATH:-/mnt/d/atlas/quant-polymarket-nautilus/nautilus_export}:/data/nautilus_export
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command: ["python", "-m", "scripts.polymarket_crypto_5m_live_signal_watcher"]

  # ---------------------------------------------------------------------------
  # Weather live daemon — uses pip-installed nautilus_trader with repo mounted
  # as a volume. Uses the recorder image (lighter than the Rust/Cython build).
  # ---------------------------------------------------------------------------

  weather-live-daemon-vpn:
    container_name: nautilus-weather-live-daemon-vpn
    profiles: ["vpn", "execution"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    working_dir: /workspace/nautilus
    env_file:
      - path: ../.env.polymarket
        required: false
    environment:
      # /app only — the script appends its own repo root via sys.path.append so
      # examples imports work, while pip-installed nautilus_trader in site-packages
      # takes precedence over the local source (which has no compiled .so files).
      PYTHONPATH: "/app"
      POLYMARKET_REQUIRE_UNBLOCKED: "${POLYMARKET_REQUIRE_UNBLOCKED:-1}"
      POLYMARKET_EXPECT_COUNTRY: "${POLYMARKET_EXPECT_COUNTRY:-JP}"
      NAUTILUS_CACHE_HOST: "${NAUTILUS_VPN_CACHE_HOST:-172.22.0.3}"
      NAUTILUS_CACHE_PORT: "${NAUTILUS_CACHE_PORT:-6379}"
    volumes:
      - ..:/workspace/nautilus
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command:
      - python
      - /workspace/nautilus/examples/live/polymarket/polymarket_weather_daily_temperature_live_daemon.py
      - --preset-set
      - live_90_basic
      - --output-dir
      - /workspace/nautilus/outputs
      - --capital-budget
      - "50"

  weather-confirmed-entry-vpn:
    container_name: nautilus-weather-confirmed-vpn
    profiles: ["vpn", "execution"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    working_dir: /workspace/nautilus
    env_file:
      - path: ../.env.polymarket
        required: false
    environment:
      PYTHONPATH: "/app"
    volumes:
      - ..:/workspace/nautilus
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command: >
      python3 examples/live/polymarket/weather_confirmed_entry_daemon.py
      --budget 20
      --output-dir /workspace/nautilus/outputs

  # ---------------------------------------------------------------------------
  # Exit server — exposes HTTP on port 8080 inside nordvpn network namespace.
  # Use: docker exec nautilus-nordvpn wget -qO- http://127.0.0.1:8080/positions
  # ---------------------------------------------------------------------------

  weather-take-profit-vpn:
    container_name: nautilus-weather-take-profit-vpn
    profiles: ["vpn"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    restart: unless-stopped
    working_dir: /workspace/nautilus
    env_file:
      - path: ../.env.polymarket
        required: false
    environment:
      PYTHONPATH: "/app"
    volumes:
      - ..:/workspace/nautilus
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    command:
      - python
      - /workspace/nautilus/examples/live/polymarket/weather_daily_temperature_take_profit.py
      - --output-dir
      - /workspace/nautilus/outputs

  weather-exit-server-vpn:
    container_name: nautilus-weather-exit-server
    profiles: ["vpn", "execution"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    working_dir: /workspace/nautilus
    env_file:
      - path: ../.env.polymarket
        required: false
    environment:
      PYTHONPATH: "/app"
      POLYMARKET_REQUIRE_UNBLOCKED: "${POLYMARKET_REQUIRE_UNBLOCKED:-1}"
      POLYMARKET_EXPECT_COUNTRY: "${POLYMARKET_EXPECT_COUNTRY:-JP}"
      EXIT_SERVER_OUTPUT_DIR: "/workspace/nautilus/outputs"
      EXIT_SERVER_PORT: "8080"
    volumes:
      - ..:/workspace/nautilus
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command:
      - python
      - /workspace/nautilus/examples/live/polymarket/weather_temperature_exit_server.py

  # ---------------------------------------------------------------------------
  # Utility profiles — geoblock check, balance monitor, execution preflight
  # Migrated from quant/ repo. Run one-shot with --profile and --rm.
  # ---------------------------------------------------------------------------

  geoblock-check:
    container_name: nautilus-geoblock-check
    profiles: ["readonly"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command: ["python", "-m", "scripts.polymarket_geoblock_check", "--json"]

  balance-monitor:
    container_name: nautilus-balance-monitor
    profiles: ["monitor"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: ../.env.polymarket
        required: false
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command: ["python", "-m", "scripts.polymarket_balance", "--positions"]

  execution-check:
    container_name: nautilus-execution-check
    profiles: ["execution"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: ../.env.polymarket
        required: false
    environment:
      POLYMARKET_REQUIRE_UNBLOCKED: "${POLYMARKET_REQUIRE_UNBLOCKED:-1}"
      POLYMARKET_EXPECT_COUNTRY: "${POLYMARKET_EXPECT_COUNTRY:-JP}"
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command: ["python", "-m", "scripts.smoke_test_accounts", "--venues", "polymarket"]

  postgres:
    container_name: nautilus-database
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nautilus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-nautilus}
      PGDATA: /data/postgres
    volumes:
      - nautilus-database:/data/postgres
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - nautilus-network
    restart: unless-stopped

  pgadmin:
    container_name: nautilus-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@mail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    volumes:
      - pgadmin:/root/.pgadmin
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5051}:80"
    networks:
      - nautilus-network
    restart: unless-stopped

  redis:
    container_name: nautilus-redis
    image: redis:7.2-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1"
      - --save
      - "300"
      - "10"
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - nautilus-redis:/data
    restart: unless-stopped
    networks:
      - nautilus-network

networks:
  nautilus-network:

volumes:
  nautilus-database:
  nautilus-redis:
  pgadmin:
