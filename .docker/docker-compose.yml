    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: ../.env.polymarket
        required: false
    environment:
      POLYMARKET_5M_ASSETS: "${POLYMARKET_5M_ASSETS:-BTC,ETH,SOL,XRP,DOGE,BNB,HYPE}"
      POLYMARKET_5M_FLUSH_ROWS: "${POLYMARKET_5M_FLUSH_ROWS:-20000}"
      POLYMARKET_5M_FLUSH_SECONDS: "${POLYMARKET_5M_FLUSH_SECONDS:-300}"
      POLYMARKET_NAUTILUS_MAX_ROWS_PER_GROUP: "${POLYMARKET_NAUTILUS_MAX_ROWS_PER_GROUP:-20000}"
    volumes:
      - ${POLYMARKET_NAUTILUS_CATALOG_HOST_PATH:-/mnt/d/atlas/quant-polymarket-nautilus/nautilus_catalog}:/data/nautilus_catalog
      - ${POLYMARKET_NAUTILUS_EXPORT_HOST_PATH:-/mnt/d/atlas/quant-polymarket-nautilus/nautilus_export}:/data/nautilus_export
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    command: ["python", "-m", "scripts.polymarket_crypto_5m_nautilus_record"]

  recorder-multi-tf-vpn:
    container_name: nautilus-recorder-multi-tf-vpn
    profiles: ["vpn", "monitor"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.recorder
    image: nautilus-recorder:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
