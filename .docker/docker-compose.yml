# Compose project label (Docker Desktop / `docker ps` grouping). Without this, the
# project name defaults to the `.docker` directory basename ("docker").
name: nautilus

services:
  workspace:
    container_name: nautilus-workspace
    build:
      context: ..
      dockerfile: .docker/DockerfileUbuntu
    working_dir: /workspace
    command: ["sleep", "infinity"]
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_CACHE_HOST:-redis}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace
    networks:
      - nautilus-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  nordvpn:
    container_name: nautilus-nordvpn
    profiles: ["vpn"]
    build:
      context: ..
      dockerfile: .docker/nordvpn.dockerfile
    env_file:
      - ../.env.nordvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "0"
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/usr/local/bin/nordvpn-entrypoint"]
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/nordvpn-healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
    networks:
      - nautilus-network
    restart: unless-stopped

  papertrade:
    container_name: nautilus-papertrade
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_paper_tester.py
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_CACHE_HOST:-redis}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace:ro
      - ../outputs:/workspace/outputs
    networks:
      - nautilus-network
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: "no"
    security_opt:
      - no-new-privileges:true

  papertrade-daemon:
    container_name: nautilus-papertrade-daemon
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_crypto_5m_paper_daemon.py
      - --asset
      - BTC
      - --preset-set
      - ${POLYMARKET_CRYPTO_5M_PRESET_SET:-research}
      - --max-rounds
      - ${POLYMARKET_CRYPTO_5M_MAX_ROUNDS:-0}
      - --execution-cutoff-seconds
      - ${POLYMARKET_CRYPTO_5M_EXECUTION_CUTOFF_SECONDS:-15}
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_CACHE_HOST:-redis}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    networks:
      - nautilus-network
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  papertrade-vpn:
    container_name: nautilus-papertrade-vpn
    profiles: ["vpn"]
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_paper_tester.py
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_VPN_CACHE_HOST:-172.22.0.3}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace:ro
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: "no"
    security_opt:
      - no-new-privileges:true

  papertrade-daemon-vpn:
    container_name: nautilus-papertrade-daemon-vpn
    profiles: ["vpn"]
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_crypto_5m_paper_daemon.py
      - --asset
      - BTC
      - --preset-set
      - ${POLYMARKET_CRYPTO_5M_PRESET_SET:-research}
      - --max-rounds
      - ${POLYMARKET_CRYPTO_5M_MAX_ROUNDS:-0}
      - --execution-cutoff-seconds
      - ${POLYMARKET_CRYPTO_5M_EXECUTION_CUTOFF_SECONDS:-15}
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_VPN_CACHE_HOST:-172.22.0.3}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  ninety-microprice-research-vpn:
    container_name: nautilus-ninety-microprice-research-vpn
    profiles: ["vpn"]
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_crypto_5m_paper_daemon.py
      - --asset
      - BTC
      - --preset-set
      - ninety_only
      - --utc-hour-min
      - "${NINETY_RESEARCH_UTC_HOUR_MIN:-21}"
      - --utc-hour-max
      - "${NINETY_RESEARCH_UTC_HOUR_MAX:-24}"
      - --max-rounds
      - "${NINETY_RESEARCH_MAX_ROUNDS:-0}"
      - --execution-cutoff-seconds
      - "${NINETY_RESEARCH_EXECUTION_CUTOFF_SECONDS:-15}"
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_VPN_CACHE_HOST:-172.22.0.3}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  crypto-results-reporter:
    container_name: nautilus-crypto-results-reporter
    image: nautilus-papertrade:latest
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - sh
      - -lc
      - |
        while true; do
          python /workspace/examples/live/polymarket/polymarket_crypto_5m_reporting.py --report-root /workspace/outputs || true
          sleep "$${REPORT_REFRESH_INTERVAL_SECONDS:-60}"
        done
    init: true
    tty: true
    stdin_open: true
    environment:
      REPORT_REFRESH_INTERVAL_SECONDS: ${REPORT_REFRESH_INTERVAL_SECONDS:-60}
    volumes:
      - ..:/workspace:ro
      - ../outputs:/workspace/outputs
    networks:
      - nautilus-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  sports-results-reporter:
    container_name: nautilus-sports-results-reporter
    image: nautilus-papertrade:latest
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - sh
      - -lc
      - |
        while true; do
          python /workspace/examples/live/polymarket/polymarket_sports_reporting.py \
            --report-root /workspace/outputs \
            --report-md /workspace/SPORTS_RESULTS.md || true
          sleep "$${REPORT_REFRESH_INTERVAL_SECONDS:-60}"
        done
    init: true
    tty: true
    stdin_open: true
    environment:
      REPORT_REFRESH_INTERVAL_SECONDS: ${REPORT_REFRESH_INTERVAL_SECONDS:-60}
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    networks:
      - nautilus-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  weather-daemon-vpn:
    container_name: nautilus-weather-daemon-vpn
    profiles: ["vpn"]
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_weather_daily_temperature_paper_daemon.py
      - --preset-set
      - all
      - --max-rounds
      - "0"
      - --output-dir
      - /workspace/outputs
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_VPN_CACHE_HOST:-172.22.0.3}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  sports-daemon-vpn:
    container_name: nautilus-sports-daemon-vpn
    profiles: ["vpn"]
    image: nautilus-papertrade:latest
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/polymarket_sports_paper_daemon.py
      - --preset-set
      - all
      - --max-rounds
      - "0"
      - --output-dir
      - /workspace/outputs
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
      - ../.env.polymarket
    environment:
      NAUTILUS_CACHE_HOST: ${NAUTILUS_VPN_CACHE_HOST:-172.22.0.3}
      NAUTILUS_CACHE_PORT: ${NAUTILUS_CACHE_PORT:-6379}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-unused}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-unused}
      POLYMARKET_CLOB_API_SECRET: ${POLYMARKET_CLOB_API_SECRET:-unused}
      POLYMARKET_CLOB_PASSPHRASE: ${POLYMARKET_CLOB_PASSPHRASE:-unused}
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  sports-settlement-vpn:
    container_name: nautilus-sports-settlement-vpn
    profiles: ["vpn"]
    image: nautilus-papertrade:latest
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/sports_settlement.py
      - --output-dir
      - /workspace/outputs
      - --poll-interval
      - "900"
      - --gamma-host
      - https://gamma-api.polymarket.com
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  weather-settlement-vpn:
    container_name: nautilus-weather-settlement-vpn
    profiles: ["vpn"]
    build:
      context: ..
      dockerfile: .docker/nautilus_trader.dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /opt/pysetup
    command:
      - python
      - /workspace/examples/live/polymarket/weather_daily_temperature_settlement.py
      - --output-dir
      - /workspace/outputs
      - --poll-interval
      - "900"
      - --report-md
      - /workspace/WEATHER_DAILY_TEMPERATURE_RESULTS.md
      - --gamma-host
      - https://gamma-api.polymarket.com
    init: true
    tty: true
    stdin_open: true
    env_file:
      - ../.env
    volumes:
      - ..:/workspace
      - ../outputs:/workspace/outputs
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  sentinel-bridge:
    image: nautilus-papertrade:latest
    profiles: ["sentinel"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - nautilus-network
    environment:
      SENTINEL_CORE_URL: "${SENTINEL_CORE_URL:-http://172.18.0.1:8080}"
      SENTINEL_API_KEY: "${SENTINEL_API_KEY:-user}"
      POLYMARKET_GAMMA_URL: "${POLYMARKET_GAMMA_URL:-https://gamma-api.polymarket.com}"
      SENTINEL_POLL_INTERVAL: "${SENTINEL_POLL_INTERVAL:-60}"
      SENTINEL_MIN_RELEVANCE: "${SENTINEL_MIN_RELEVANCE:-0.05}"
      SENTINEL_SIGNAL_PATH: "/data/live_signals/sentinel_news_signals.jsonl"
    volumes:
      - ${NAUTILUS_SENTINEL_SIGNALS_PATH:-/tmp/sentinel_signals}:/data/live_signals
    command:
      - python
      - -m
      - examples.live.polymarket.sentinel_signal_bridge
      - --max-iterations
      - "0"

  sentinel-news-daemon-vpn:
    image: nautilus-papertrade:latest
    profiles: ["vpn", "sentinel"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    network_mode: "service:nordvpn"
    depends_on:
      nordvpn:
        condition: service_healthy
    env_file:
      - path: .env.polymarket
        required: false
    environment:
      SENTINEL_CORE_URL: "${SENTINEL_CORE_URL:-http://172.18.0.1:8080}"
      SENTINEL_API_KEY: "${SENTINEL_API_KEY:-user}"
      NAUTILUS_CACHE_HOST: "${NAUTILUS_VPN_CACHE_HOST:-redis}"
      NAUTILUS_CACHE_PORT: "${NAUTILUS_CACHE_PORT:-6379}"
      SENTINEL_SIGNAL_PATH: "/data/live_signals/sentinel_news_signals.jsonl"
    volumes:
      - ${NAUTILUS_SENTINEL_SIGNALS_PATH:-/tmp/sentinel_signals}:/data/live_signals
      - ${NAUTILUS_SENTINEL_OUTPUT_PATH:-/tmp/sentinel_outputs}:/workspace/outputs
    working_dir: /workspace/nautilus
    command:
      - python
      - examples/live/polymarket/polymarket_sentinel_news_daemon.py
      - --poll-interval
      - "${SENTINEL_POLL_INTERVAL:-300}"
      - --min-relevance
      - "${SENTINEL_MIN_RELEVANCE:-0.25}"

  postgres:
    container_name: nautilus-database
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nautilus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-nautilus}
      PGDATA: /data/postgres
    volumes:
      - nautilus-database:/data/postgres
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - nautilus-network
    restart: unless-stopped

  pgadmin:
    container_name: nautilus-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@mail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    volumes:
      - pgadmin:/root/.pgadmin
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5051}:80"
    networks:
      - nautilus-network
    restart: unless-stopped

  redis:
    container_name: nautilus-redis
    image: redis:7.2-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1"
      - --save
      - "300"
      - "10"
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - nautilus-redis:/data
    restart: unless-stopped
    networks:
      - nautilus-network

networks:
  nautilus-network:

volumes:
  nautilus-database:
  nautilus-redis:
  pgadmin:
